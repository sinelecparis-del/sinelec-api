<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>SINELEC Paris</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }
.header { background:#111; border-bottom:2px solid #F5A623; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header h1 { font-size:20px; font-weight:900; color:#F5A623; letter-spacing:1px; }
.header span { font-size:11px; color:#888; }
.tabs { display:flex; background:#111; border-bottom:1px solid #222; }
.tab { flex:1; padding:14px; text-align:center; font-size:13px; font-weight:700; color:#666; cursor:pointer; border-bottom:3px solid transparent; transition:all 0.2s; text-transform:uppercase; letter-spacing:0.5px; }
.tab.active { color:#F5A623; border-bottom-color:#F5A623; }
.content { padding:16px; max-width:600px; margin:0 auto; }
.section { margin-bottom:20px; }
.section-title { font-size:11px; font-weight:700; color:#F5A623; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.input-group { margin-bottom:12px; }
.input-group label { display:block; font-size:12px; color:#888; margin-bottom:4px; }
.input-group input, .input-group textarea { width:100%; background:#18181b; border:1px solid #333; border-radius:8px; padding:12px; color:#fff; font-size:15px; outline:none; }
.input-group input:focus, .input-group textarea:focus { border-color:#F5A623; }
.input-group textarea { height:70px; resize:none; }
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.cat-btn { background:#18181b; border:1px solid #333; border-radius:8px; padding:10px 8px; color:#ccc; font-size:12px; cursor:pointer; text-align:center; transition:all 0.2s; }
.cat-btn.selected { background:#F5A623; color:#000; border-color:#F5A623; font-weight:700; }
.prestations { display:none; flex-direction:column; gap:6px; margin-bottom:12px; }
.prestations.show { display:flex; }
.prest-btn { background:#18181b; border:1px solid #333; border-radius:8px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:all 0.2s; }
.prest-name { font-size:13px; color:#ddd; }
.prest-price { font-size:13px; font-weight:700; color:#F5A623; }
.panier { background:#18181b; border-radius:10px; border:1px solid #333; overflow:hidden; margin-bottom:16px; }
.panier-header { padding:12px 14px; background:#222; font-size:12px; font-weight:700; color:#F5A623; text-transform:uppercase; letter-spacing:0.5px; display:flex; justify-content:space-between; }
.panier-empty { padding:20px; text-align:center; color:#555; font-size:13px; }
.panier-item { padding:10px 14px; border-top:1px solid #2a2a2a; display:flex; align-items:center; gap:10px; }
.panier-item-name { flex:1; font-size:13px; color:#ddd; }
.panier-item-price { font-size:13px; font-weight:700; color:#fff; min-width:70px; text-align:right; }
.qte-ctrl { display:flex; align-items:center; gap:6px; }
.qte-btn { width:26px; height:26px; background:#333; border:none; border-radius:6px; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.qte-val { font-size:14px; font-weight:700; color:#F5A623; min-width:20px; text-align:center; }
.del-btn { background:none; border:none; color:#555; font-size:16px; cursor:pointer; padding:4px; }
.total-bar { background:#F5A623; border-radius:10px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.total-label { font-size:13px; font-weight:700; color:#000; }
.total-amount { font-size:22px; font-weight:900; color:#000; }
.btn-gen { width:100%; background:#F5A623; color:#000; border:none; border-radius:10px; padding:18px; font-size:16px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; margin-top:8px; }
.btn-gen:disabled { opacity:0.5; }
.status { text-align:center; padding:12px; border-radius:8px; font-size:13px; margin-top:10px; display:none; }
.status.success { background:#1a3a1a; color:#4ade80; border:1px solid #2d6a2d; display:block; }
.status.error { background:#3a1a1a; color:#f87171; border:1px solid #6a2d2d; display:block; }
.status.loading { background:#1a2a3a; color:#60a5fa; border:1px solid #2d4a6a; display:block; }
.page { display:none; }
.page.active { display:block; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ SINELEC</h1>
  <span>Paris & IDF 24h/24</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('devis', this)">📋 Devis</div>
  <div class="tab" onclick="switchTab('facture', this)">💶 Facture</div>
</div>

<div id="page-devis" class="page active">
<div class="content">
  <div class="section">
    <div class="section-title">Informations client</div>
    <div class="input-group"><label>Nom / Société</label><input type="text" id="d-client" placeholder="Ex: Dupont Marie"></div>
    <div class="input-group"><label>Adresse</label><input type="text" id="d-adresse" placeholder="Ex: 12 rue de la Paix, 75001 Paris"></div>
    <div class="input-group"><label>Email client (pour envoi auto)</label><input type="email" id="d-email" placeholder="client@email.com"></div>
    <div class="input-group"><label>Description du chantier</label><textarea id="d-description" placeholder="Ex: Remplacement tableau + 3 prises"></textarea></div>
  </div>
  <div class="section">
    <div class="section-title">Prestations</div>
    <div class="cat-grid" id="d-cats"></div>
    <div class="prestations" id="d-prests"></div>
  </div>
  <div class="panier">
    <div class="panier-header"><span>🛒 Panier</span><span id="d-count">0 prestation(s)</span></div>
    <div id="d-panier-items"><div class="panier-empty">Aucune prestation ajoutée</div></div>
  </div>
  <div class="total-bar">
    <span class="total-label">TOTAL HT</span>
    <span class="total-amount" id="d-total">0,00 €</span>
  </div>
  <button class="btn-gen" id="d-btn" onclick="generer('devis')">📄 Générer le devis PDF</button>
  <div class="status" id="d-status"></div>
</div>
</div>

<div id="page-facture" class="page">
<div class="content">
  <div class="section">
    <div class="section-title">Informations client</div>
    <div class="input-group"><label>Nom / Société</label><input type="text" id="f-client" placeholder="Ex: Dupont Marie"></div>
    <div class="input-group"><label>Adresse</label><input type="text" id="f-adresse" placeholder="Ex: 12 rue de la Paix, 75001 Paris"></div>
    <div class="input-group"><label>Email client (pour envoi auto)</label><input type="email" id="f-email" placeholder="client@email.com"></div>
    <div class="input-group"><label>Description des travaux</label><textarea id="f-description" placeholder="Ex: Remplacement tableau réalisé"></textarea></div>
  </div>
  <div class="section">
    <div class="section-title">Prestations réalisées</div>
    <div class="cat-grid" id="f-cats"></div>
    <div class="prestations" id="f-prests"></div>
  </div>
  <div class="panier">
    <div class="panier-header"><span>🛒 Panier</span><span id="f-count">0 prestation(s)</span></div>
    <div id="f-panier-items"><div class="panier-empty">Aucune prestation ajoutée</div></div>
  </div>
  <div class="total-bar">
    <span class="total-label">TOTAL HT</span>
    <span class="total-amount" id="f-total">0,00 €</span>
  </div>
  <button class="btn-gen" id="f-btn" onclick="generer('facture')">💶 Générer la facture PDF</button>
  <div class="status" id="f-status"></div>
</div>
</div>

let compteurDevis = parseInt(localStorage.getItem('compteurDevis') || '0');
let compteurFacture = parseInt(localStorage.getItem('compteurFacture') || '0');
let panierD = [], panierF = [];

function initCats(prefix) {
  const grid = document.getElementById(`${prefix}-cats`);
  grid.innerHTML = '';
  Object.keys(GRILLE).forEach(cat => {
    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll(`#${prefix}-cats .cat-btn`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      showPrests(prefix, cat);
    };
    grid.appendChild(btn);
  });
}

function showPrests(prefix, cat) {
  const container = document.getElementById(`${prefix}-prests`);
  container.innerHTML = '';
  container.classList.add('show');
  Object.entries(GRILLE[cat]).forEach(([nom, prix]) => {
    const div = document.createElement('div');
    div.className = 'prest-btn';
    div.innerHTML = `<span class="prest-name">${nom}</span><span class="prest-price">${prix} €</span>`;
    div.onclick = () => {
      addToCart(prefix, nom, prix);
      div.style.borderColor = '#F5A623';
      setTimeout(() => div.style.borderColor = '#333', 500);
    };
    container.appendChild(div);
  });
}

function addToCart(prefix, nom, prix) {
  const panier = prefix === 'd' ? panierD : panierF;
  const ex = panier.find(i => i.designation === nom);
  if (ex) ex.qte++;
  else panier.push({ designation: nom, prixUnit: prix, qte: 1 });
  renderPanier(prefix);
}

function changeQte(prefix, idx, delta) {
  const panier = prefix === 'd' ? panierD : panierF;
  panier[idx].qte = Math.max(1, panier[idx].qte + delta);
  renderPanier(prefix);
}

function removeItem(prefix, idx) {
  if (prefix === 'd') panierD.splice(idx, 1);
  else panierF.splice(idx, 1);
  renderPanier(prefix);
}

function renderPanier(prefix) {
  const panier = prefix === 'd' ? panierD : panierF;
  const container = document.getElementById(`${prefix}-panier-items`);
  const countEl = document.getElementById(`${prefix}-count`);
  const totalEl = document.getElementById(`${prefix}-total`);
  if (panier.length === 0) {
    container.innerHTML = '<div class="panier-empty">Aucune prestation ajoutee</div>';
    countEl.textContent = '0 prestation(s)';
    totalEl.textContent = '0,00 €';
    return;
  }
  container.innerHTML = '';
  let total = 0;
  panier.forEach((item, idx) => {
    const lineTotal = item.qte * item.prixUnit;
    total += lineTotal;
    const div = document.createElement('div');
    div.className = 'panier-item';
    div.innerHTML = `
      <span class="panier-item-name">${item.designation}</span>
      <div class="qte-ctrl">
        <button class="qte-btn" onclick="changeQte('${prefix}',${idx},-1)">−</button>
        <span class="qte-val">${item.qte}</span>
        <button class="qte-btn" onclick="changeQte('${prefix}',${idx},1)">+</button>
      </div>
      <span class="panier-item-price">${lineTotal.toFixed(2)} €</span>
      <button class="del-btn" onclick="removeItem('${prefix}',${idx})">🗑</button>
    `;
    container.appendChild(div);
  });
  countEl.textContent = `${panier.length} prestation(s)`;
  totalEl.textContent = total.toFixed(2).replace('.', ',') + ' €';
}

  const el = document.getElementById(`${prefix}-status`);

async function envoyerEmail(pdfBase64, data, type) {
  if (!data.email && type === 'devis') return false;
  const dest = data.email || 'sinelec.paris@gmail.com';
  try {
    const res = await fetch('/envoyer-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: dest,
        client: data.client,
        num: data.num,
        totalHT: data.totalHT,
        type: type,
        pdfBase64: pdfBase64,
      })
    });
    const result = await res.json();
    return result.success === true;
  } catch(e) {
    console.log('Email error:', e);
    return false;
  }
}

async function generer(type) {
  const p = type === 'devis' ? 'd' : 'f';
  const client = document.getElementById(`${p}-client`).value.trim();
  const adresse = document.getElementById(`${p}-adresse`).value.trim();
  const email = document.getElementById(`${p}-email`).value.trim();
  const panier = type === 'devis' ? panierD : panierF;

  if (!client) { showStatus(p, 'error', '⚠ Nom du client obligatoire'); return; }
  if (!adresse) { showStatus(p, 'error', '⚠ Adresse obligatoire'); return; }
  if (panier.length === 0) { showStatus(p, 'error', '⚠ Ajoute au moins une prestation'); return; }

  const btn = document.getElementById(`${p}-btn`);
  btn.disabled = true;
  btn.textContent = '⏳ Generation en cours...';
  showStatus(p, 'loading', '⏳ Generation du PDF...');

  try {
    const now = new Date();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const yyyy = now.getFullYear();

    let num, compteur;
    if (type === 'devis') {
      compteurDevis++;
      localStorage.setItem('compteurDevis', compteurDevis);
      num = `OS-${yyyy}${mm}-${String(compteurDevis).padStart(3, '0')}`;
    } else {
      compteurFacture++;
      localStorage.setItem('compteurFacture', compteurFacture);
      num = `FA-${yyyy}${mm}-${String(compteurFacture).padStart(3, '0')}`;
    }

    const date = now.toLocaleDateString('fr-FR');
    const valide = new Date(new Date().setDate(now.getDate() + 30)).toLocaleDateString('fr-FR');
    const totalHT = panier.reduce((s, l) => s + l.qte * l.prixUnit, 0);
    const lignes = panier.map(l => ({ ...l, total: l.qte * l.prixUnit }));

    const data = { num, date, valide, client, adresse, email, lignes, totalHT };
    const doc = genererPDF(type, data);

    // Téléchargement PDF
    doc.save(`${num}_${client.replace(/\s+/g, '_').toUpperCase()}.pdf`);

    // Envoi email si email fourni
    if (email) {
      showStatus(p, 'loading', '⏳ Envoi email au client...');
      const pdfBase64 = doc.output('datauristring').split(',')[1];
      const emailOk = await envoyerEmail(pdfBase64, data, type);
      if (emailOk) {
        showStatus(p, 'success', `✅ PDF telecharge + email envoye a ${email} !`);
      } else {
        showStatus(p, 'success', `✅ PDF telecharge ! (Email non envoye)`);
      }
    } else {
      showStatus(p, 'success', '✅ PDF telecharge avec succes !');
    }

    // Reset panier
    if (type === 'devis') panierD = [];
    else panierF = [];
    renderPanier(p);

  } catch(e) {
    showStatus(p, 'error', '❌ Erreur : ' + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = type === 'devis' ? '📄 Generer le devis PDF' : '💶 Generer la facture PDF';
  }
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`page-${tab}`).classList.add('active');
}
